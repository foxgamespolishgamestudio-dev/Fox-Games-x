<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fox Games – Contact</title>

<meta name="google-site-verification" content="M7vug9Nc1tNSyYQYSEXODu2oIwvEFyJkViX1kiObnyA" />
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Space Grotesk', sans-serif; background:#0a0a0a; color:white; }
.navbar { display:flex; justify-content:space-between; align-items:center; padding:20px 50px; background:#000; border-bottom:1px solid #111; position:fixed; top:0; width:100%; z-index:100; box-sizing:border-box; }
.navbar .logo img { height:80px; }
.navbar a { color:#aaa; margin-left:30px; text-decoration:none; font-weight:500; }
.navbar a:hover { color:white; }

.hero { text-align:center; padding:140px 20px 40px 20px; background:linear-gradient(to bottom, #0a0a0a, #1a0000); }
.hero h1 { font-size:70px; margin:0; color:#ff3333; }
.hero p { color:#bbb; font-size:22px; max-width:700px; margin:20px auto 0 auto; text-align:center; }

.contact-block {
    max-width:600px;
    margin:auto;
    padding:50px 20px;
    background:#111;
    border-radius:15px;
    box-shadow:0 0 30px rgba(255,0,0,0.2);
    margin-top:60px;
}

.contact-block form input,
.contact-block form textarea {
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
    font-size:16px;
}

.contact-block form textarea { min-height:120px; resize:vertical; }

.contact-block form button {
    padding:15px 30px;
    font-size:16px;
    font-weight:600;
    color:white;
    background:red;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.contact-block form button:hover { background:#ff5555; }

@media (max-width:768px) {
    .hero h1 { font-size:50px; }
    .hero p { font-size:18px; }
    .navbar a { margin-left:15px; font-size:14px; }
    .navbar .logo img { height:60px; }
}
</style>
</head>
<body>

<div class="navbar">
    <div class="logo"><img src="Fox games.png" alt="Fox Games Logo"></div>
    <div>
        <a href="index.html">Home</a>
        <a href="our-games.html">Our Games</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
</div>

<div class="hero">
    <h1>Contact Us</h1>
    <p>If you want to reach Fox Games, contact us below!</p>
</div>

<div class="contact-block">
    <h2>Get in Touch</h2>
    <p>Email: <strong>fox.games.polish.game.studio@gmail.com</strong></p>
    <form name="contact" method="POST" data-netlify="true">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
</div>

</body>
</html>
