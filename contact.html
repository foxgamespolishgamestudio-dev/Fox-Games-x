<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fox Games - Contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Space Grotesk'; background:#0a0a0a; color:white; }

.navbar { position:fixed; width:100%; background:#0a0a0a; border-bottom:1px solid #222; }
.navbar-inner { max-width:1200px; margin:auto; display:flex; justify-content:space-between; padding:15px 20px; }

.hero { text-align:center; padding:120px 20px; background:linear-gradient(#0a0a0a,#1a0000); }
.hero h1 { font-size:60px; color:#ff3333; }
.hero p { color:#bbb; max-width:700px; margin:20px auto; }

.contact-block {
    max-width:700px;
    margin:60px auto;
    padding:40px;
    background:#111;
    border-radius:15px;
}

input, textarea {
    width:100%;
    padding:15px;
    margin-bottom:20px;
    background:#222;
    border:none;
    color:white;
}

button {
    padding:15px 30px;
    background:red;
    border:none;
    color:white;
}

@media(max-width:768px){
.navbar-inner { flex-direction:column; }
}
</style>
</head>

<body>

<div class="navbar">
<div class="navbar-inner">
<div class="logo"><img src="Fox games.png"></div>
<div class="nav-links">
<a href="index.html">Home</a>
<a href="our-games.html">Our Games</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>
</div>
</div>

<div class="hero">
<h1>Contact Us</h1>
<p>If you want to reach Fox Games, have questions, or want to collaborate, feel free to contact us via email or using the form below. We love hearing from our community and fellow developers!</p>
</div>

<div class="contact-block">
<h2>Get in Touch</h2>
<p>Email: <strong>fox.games.polish.game.studio@gmail.com</strong></p>

<form>
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<textarea placeholder="Your Message" required></textarea>
<button type="submit">Send Message</button>
</form>
</div>

</body>
</html>
